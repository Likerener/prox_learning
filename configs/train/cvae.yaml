# CVAE proof-of-concept (skin proximity, 29 patches, 8x8 each).
# Existing run is at runs/cvae_v3/ (was skin_sanity/cvae/runs/v3/).

run_name: v4
data:
  root: data/skin_pick_fixed_v1
  zfar_m: 4.0
  conditioning: arm_qpos_plus_tcp_pose   # 14-dim
optim:
  lr: 3.0e-4
  batch_size: 256
  epochs: 200
  beta_kl: 1.0e-3
model:
  z_dim: 32
  hidden: 512
logging:
  run_dir: runs/cvae_v4
