# PLA training config (PROJECT.md §3.4).
# ACT hyperparameters are exact Zhao et al. 2023 values.

model:
  d_model: 512
  n_sensors: 32
  proprio_dim: 7
  action_dim: 7
  chunk_size: 100
  vl_backbone: molmo2-4b
  freeze_vl: true        # do not fine-tune Molmo2 — preserve 1.8M traj priors
  proximity_encoder:
    hidden: 128
    out: 512

optim:
  lr: 1.0e-5
  batch_size: 8
  optimizer: adam
  beta_kl: 10.0          # constant, not annealed
  max_steps: 200000
  grad_clip_norm: 1.0

data:
  root: data/raw
  train_split: 0.95
  augment_rgb: false
  proximity_normalize: { min_mm: 20, max_mm: 4000 }

checks:
  proximity_encoder_grad_norm_min: 1.0e-8
  log_grad_every: 500

logging:
  run_dir: runs/pla
  wandb_project: pla-corl
  ckpt_every: 5000
  eval_every: 5000
