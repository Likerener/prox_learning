# Standard pick-and-place baseline (open workspace, no obstacles near path).
# Used to show baseline competence and that proximity tokens don't hurt.

task: pnp
robot: franka_droid_skin
mjcf: assets/mjcf/fr3_skin.xml
n_envs: 10
scenes_per_env: 100
obstacle:
  enabled: false
recording:
  rgb: { resolution: [224, 224], cameras: [head, wrist] }
  tof: { resolution: [8, 8], n_sensors: 32, range_mm: [20, 4000] }
  hz: 20
