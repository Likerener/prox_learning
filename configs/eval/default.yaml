# Default eval protocol (PROJECT.md §4.1).

n_episodes_per_condition: 100
randomize_camera: true
seed: 42
tasks:
  - pnp
  - near_contact
  - pnp_color
  - pnp_next_to
statistics:
  bootstrap_resamples: 10000
  alpha: 0.05
  paired_pvalue_against: vlm_only_act
output:
  reports_dir: reports/eval
  videos:
    record_failure_cases: true
    n_per_failure_type: 5
